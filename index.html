<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#fafafa;color:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid #ececec;border-radius:22px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px rgba(20,20,40,.07);width:100%;max-width:400px;padding:36px 34px;text-align:center}
  .logomark{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#0a0a0a,#333);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}

  h1{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
  p.sub{font-size:14.5px;color:#6b7280;margin-bottom:26px}
  input{width:100%;font-size:15.5px;font-family:'Inter';padding:14px 16px;border:1px solid #e2e2e2;border-radius:12px;outline:none;transition:border .15s,box-shadow .15s}
  input:focus{border-color:#00b37e;box-shadow:0 0 0 3px rgba(0,179,126,.15)}
  button{width:100%;margin-top:14px;background:#00b37e;color:#fff;font-weight:600;font-size:15.5px;font-family:'Inter';padding:14px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 8px 20px rgba(0,179,126,.26);transition:transform .12s}
  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:#d6336c;font-size:13.5px;margin-top:14px;min-height:18px;font-weight:500}
  .lock{font-size:12px;color:#9aa0b2;margin-top:22px}
</style>

  const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function unlock(pw){
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64d(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(ENC.iv) }, key, b64d(ENC.data));
    return new TextDecoder().decode(pt);
  }
  const f=document.getElementById('f'), pw=document.getElementById('pw'),
        err=document.getElementById('err'), go=document.getElementById('go');
  f.addEventListener('submit', async e => {
    e.preventDefault(); err.textContent=''; go.disabled=true; go.textContent='Unlocking…';
    try{
      const html = await unlock(pw.value);
      document.open(); document.write(html); document.close();
    }catch(_){
      err.textContent='Incorrect password. Try again.';
      go.disabled=false; go.textContent='Unlock →'; pw.select();
    }
  });
