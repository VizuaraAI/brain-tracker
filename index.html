  button:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:#d6336c;font-size:13.5px;margin-top:14px;min-height:18px;font-weight:500}

    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64d(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(ENC.iv) }, key, b64d(ENC.data));
    return new TextDecoder().decode(pt);
  }
  const f=document.getElementById('f'), pw=document.getElementById('pw'),
        err=document.getElementById('err'), go=document.getElementById('go');
  f.addEventListener('submit', async e => {
    e.preventDefault(); err.textContent=''; go.disabled=true; go.textContent='Unlocking…';
    try{
      const html = await unlock(pw.value);
      document.open(); document.write(html); document.close();
    }catch(_){
      err.textContent='Incorrect password. Try again.';
      go.disabled=false; go.textContent='Unlock →'; pw.select();
    }
  });
</script>
