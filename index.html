  button{width:100%;margin-top:14px;background:#00b37e;color:#fff;font-weight:600;font-size:15.5px;font-family:'Inter';padding:14px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 8px 20px rgba(0,179,126,.26);transition:transform .12s}

  button:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:#d6336c;font-size:13.5px;margin-top:14px;min-height:18px;font-weight:500}

  const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function unlock(pw){
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64d(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(ENC.iv) }, key, b64d(ENC.data));
    return new TextDecoder().decode(pt);
  }

    try{
      const html = await unlock(pw.value);
      document.open(); document.write(html); document.close();
    }catch(_){
